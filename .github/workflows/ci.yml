name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  backend-test:
    name: Go Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: openair
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: openair_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: openair
          DB_PASSWORD: testpassword
          DB_NAME: openair_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          APP_ENV: test
        run: go test ./... -v -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.out

  mobile-test:
    name: Flutter Mobile Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          channel: stable
          cache: true

      - name: Create dummy Firebase config for CI
        run: |
          mkdir -p mobile/android/app
          echo '{"project_info":{"project_id":"openair-ci"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000"},"api_key":[{"current_key":"dummy"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > mobile/android/app/google-services.json
          mkdir -p mobile/ios/Runner
          cp mobile/ios/Runner/GoogleService-Info.plist.example mobile/ios/Runner/GoogleService-Info.plist 2>/dev/null || echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>API_KEY</key><string>dummy</string><key>BUNDLE_ID</key><string>com.tgkcapture.openair</string><key>PROJECT_ID</key><string>openair-ci</string><key>STORAGE_BUCKET</key><string>openair-ci.appspot.com</string><key>GCM_SENDER_ID</key><string>000000000000</string><key>GOOGLE_APP_ID</key><string>1:000000000000:ios:0000000000000000</string></dict></plist>' > mobile/ios/Runner/GoogleService-Info.plist

      - name: Install dependencies
        working-directory: ./mobile
        run: flutter pub get

      - name: Run analyzer
        working-directory: ./mobile
        run: flutter analyze

      - name: Run tests
        working-directory: ./mobile
        run: flutter test --coverage

  admin-test:
    name: React Admin Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: ./admin
        run: npm ci

      - name: Run linter
        working-directory: ./admin
        run: npm run lint

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, mobile-test, admin-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.dev
          push: false
          tags: openair-api:ci