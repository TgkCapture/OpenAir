name: Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Build & Deploy Staging
    runs-on: ubuntu-latest
    needs: []
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/tgkcapture/openair-api:staging
            ghcr.io/tgkcapture/openair-api:${{ github.sha }}

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/openair
            docker pull ghcr.io/tgkcapture/openair-api:staging
            docker-compose -f docker-compose.staging.yml up -d --no-deps api
            docker-compose -f docker-compose.staging.yml exec -T api wget -qO- http://localhost:8000/health
            echo "Staging deploy complete"