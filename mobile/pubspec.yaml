name: openair
description: Open-source broadcaster streaming platform
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

  # Video & Audio (actively maintained, works with Android SDK 36)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.5
  just_audio: ^0.9.39
  audio_service: ^0.18.13

  # UI helpers
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # DI
  get_it: ^7.7.0

  # Utilities
  network_info_plus: ^6.0.0

  # Notifications
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/openair_icon_512x512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/icons/openair_icon_512x512.png"
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icons/