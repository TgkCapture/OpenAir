name: openair
description: Open-source broadcaster streaming platform
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  go_router: ^14.2.0
  dio: ^5.4.3
  retrofit: ^4.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0
  better_player: ^0.0.84
  just_audio: ^0.9.39
  audio_service: ^0.18.13
  firebase_core: ^3.2.0
  firebase_messaging: ^15.0.4
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  equatable: ^2.0.5
  get_it: ^7.7.0
  injectable: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  injectable_generator: ^2.4.1
  retrofit_generator: ^10.2.5
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/