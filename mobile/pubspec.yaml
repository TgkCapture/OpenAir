name: openair
description: Open-source broadcaster streaming platform
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"  

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  go_router: ^17.2.1
  dio: ^5.4.3
  retrofit: ^4.4.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.0
  better_player: ^0.0.84
  just_audio: ^0.10.5
  audio_service: ^0.18.13
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  equatable: ^2.0.5
  get_it: ^9.2.1
  injectable: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  injectable_generator: ^2.4.1
  retrofit_generator: ^10.2.5
  flutter_lints: ^6.0.0  # Updated
  bloc_test: ^10.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/